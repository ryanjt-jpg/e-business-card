<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ryan Tracy</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #15181f;
      --border: rgba(255,255,255,0.07);
      --text: #f0f2f7;
      --muted: #7a8099;
      --accent: #4f8ef7;
      --accent-glow: rgba(79,142,247,0.18);
      --radius: 16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
    }

    /* Ambient glow behind card */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    /* Header band */
    .header {
      background: linear-gradient(135deg, #1a2540 0%, #111827 100%);
      padding: 40px 32px 28px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .avatar {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f8ef7, #7b5ea7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: #fff;
      margin: 0 auto 16px;
      box-shadow: 0 0 0 3px rgba(79,142,247,0.3), 0 8px 32px rgba(79,142,247,0.25);
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      letter-spacing: -0.3px;
      color: #fff;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* Links section */
    .links {
      padding: 24px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      cursor: pointer;
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .icon {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg { width: 20px; height: 20px; }

    .icon-linkedin { background: #0a66c2; }
    .icon-instagram { background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7); }
    .icon-snapchat { background: #FFFC00; }
    .icon-snapchat svg path { fill: #000; }
    .icon-phone { background: #25d366; }
    .icon-email { background: #ea4335; }

    .link-label {
      display: flex;
      flex-direction: column;
      line-height: 1;
      gap: 4px;
    }

    .link-label span:first-child {
      font-size: 15px;
      font-weight: 500;
    }

    .link-label span:last-child {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .arrow {
      margin-left: auto;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Save contact button */
    .save-btn {
      display: block;
      margin: 0 24px 24px;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(79,142,247,0.35);
      transition: opacity 0.18s, transform 0.15s, box-shadow 0.18s;
    }

    .save-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(79,142,247,0.45);
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #3a3f52;
      letter-spacing: 0.4px;
      text-align: center;
      z-index: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .link-btn, .save-btn { transition: none; }
    }
  </style>
</head>
